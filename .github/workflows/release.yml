name: Release

on:
  push:
    tags:
      - "*"

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/frostyard/snow:latest
      volumes:
        - /proc:/proc
        - /:/run/host
      options: --privileged -it
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set meson version by tag
        id: set_version
        run: |
          sed -i 's/VTESTING/${{ github.ref_name }}/g' meson.build

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y awscli
          apt-get build-dep -y .

      - name: Build .deb package
        run: |
          dpkg-buildpackage
          cp ../snow-first-setup_*.deb snow-first-setup.deb

      - name: Calculate and Save Checksums
        run: |
          sha256sum snow-first-setup.deb >> checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: first-setup
          path: |
            checksums.txt
            snow-first-setup.deb

      - name: Move files
        run: |
          mkdir -p ./dist
          mv checksums.txt ./dist/checksums.txt
          mv ../snow-first-setup_*.deb  ./dist/

      - name: Publish to frostyard repo
        uses: frostyard/repogen/.github/actions/publish-to-r2@main
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: frostyardrepo
          purge-cache: "true"
          cloudflare-zone: ${{ secrets.CLOUDFLARE_ZONE }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          gpg-private-key: ${{ secrets.REPOGEN_GPG_KEY }}
          packages-dir: ./dist
          package-type: deb # or sysext
          base-url: https://repository.frostyard.org # required for sysext

  release:
    runs-on: ubuntu-latest
    needs: build-artifacts
    permissions:
      contents: write # to create and upload assets to releases
      attestations: write # to upload assets attestation for build provenance
      id-token: write # grant additional permission to attestation action to mint the OIDC token permission

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: first-setup

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes snow-first-setup.deb checksums.txt

      - name: Attest Release Files
        id: attest
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "snow-first-setup.deb, checksums.txt"

      - name: Kickoff snosi
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ORG_PAT }}
          repository: frostyard/snosi
          event-type: build
